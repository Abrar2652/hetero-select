# HeteRo-Select default hyperparameters.
# These match DEFAULT_FL_CONFIG in heteroselect/config.py exactly and are
# kept as a YAML mirror for users who prefer to edit hyperparameters in a
# separate file rather than in code.  Pass this file with:
#     python scripts/train.py --config configs/default.yaml

# ── FedCG protocol (fixed) ────────────────────────────────────────────────
num_clients: 100
clients_per_round: 10
num_rounds: 100
local_steps: 50
mu: 0.1
bw_min_mbps: 1.0
bw_max_mbps: 5.0
comp_min_s: 0.10
comp_max_s: 0.50
target_acc:
  cifar10: 0.70
  cifar100: 0.54

# ── Compression schedule ──────────────────────────────────────────────────
theta_total: 0.20
theta_floor: 0.08
warmup_rounds: 1
alpha_cos: 0.4

# ── Local training ────────────────────────────────────────────────────────
local_lr: 0.05
lr_scale_cap: 0.15
grad_clip: 2.0
batch_size: 32
eval_batches: 8

# ── Scoring weights ───────────────────────────────────────────────────────
lambda_D: 0.3
lambda_F: 0.2
lambda_St: 0.2
gamma_St: 0.5

# ── Softmax temperature ───────────────────────────────────────────────────
tau_0: 1.0

# ── Server momentum ───────────────────────────────────────────────────────
beta_s: 0.5

# ── Markov-Newton sparsification ──────────────────────────────────────────
newton_Q: 3
newton_lambda: 0.2

# ── BatchNorm calibration ─────────────────────────────────────────────────
bn_calib_batches: 20
